services:
  postgres:
    image: postgres:16-alpine
    container_name: gommo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gommo}
      POSTGRES_USER: ${POSTGRES_USER:-gommo}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env na raiz}"
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - gommo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gommo -d gommo"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  gommo-backend:
    build:
      context: ./gommo-backend
      dockerfile: Dockerfile
      target: dev
    container_name: gommo-backend
    working_dir: /app
    volumes:
      - ./gommo-backend:/app
      - ./.env:/app/../.env:ro
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-gommo}
      DB_USER: ${POSTGRES_USER:-gommo}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD}
      CORS_ORIGINS: http://localhost:3000,http://*.localhost:3000,http://localhost:3001
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "mvn -q spring-boot:run -Dspring-boot.run.profiles=dev"

  gommo-admin-backend:
    image: eclipse-temurin:21-jdk-alpine
    container_name: gommo-admin-backend
    working_dir: /app
    volumes:
      - ./gommo-admin-backend:/app
      - ./.env:/app/../.env:ro
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-gommo}
      DB_USER: ${POSTGRES_USER:-gommo}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD}
      ADMIN_CORS_ORIGINS: http://localhost:3001
      ADMIN_SERVER_PORT: 8082
      TENANT_DB_FALLBACK_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "mvn -q spring-boot:run -Dspring-boot.run.profiles=dev"

  gommo-frontend:
    image: node:22-alpine
    container_name: gommo-frontend
    working_dir: /app
    volumes:
      - ./gommo-frontend:/app
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-min-32-chars-secret-key}
      NEXT_PUBLIC_API_URL: http://localhost:8081
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - gommo-backend

  gommo-admin-frontend:
    image: node:22-alpine
    container_name: gommo-admin-frontend
    working_dir: /app
    volumes:
      - ./gommo-admin-frontend:/app
    environment:
      AUTH_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3001
      AUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-min-32-chars-secret-key}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-min-32-chars-secret-key}
      NEXT_PUBLIC_ADMIN_API_URL: http://localhost:8082
      NEXT_PUBLIC_HR_API_URL: http://localhost:8081
    ports:
      - "3001:3001"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - gommo-admin-backend
      - gommo-backend

volumes:
  gommo_pg_data:
