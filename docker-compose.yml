services:
  postgres:
    image: postgres:16-alpine
    container_name: gommo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gommo}
      POSTGRES_USER: ${POSTGRES_USER:-gommo}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env na raiz}"
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - gommo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gommo -d gommo"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  gommo_pg_data:
