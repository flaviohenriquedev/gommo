spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gommo}
    username: ${DB_USER:gommo}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false

gommo-admin:
  security:
    jwt:
      # Sobrescreva com JWT_SECRET no .env da raiz (mínimo 32 caracteres)
      secret: ${JWT_SECRET:dev-gommo-jwt-secret-minimo-32-caracteres-local}
  cors:
    allowed-origins: http://localhost:3001
