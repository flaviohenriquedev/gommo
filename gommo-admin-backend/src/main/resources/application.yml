spring:
  application:
    name: gommo-admin-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: America/Sao_Paulo
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: admin
        jdbc:
          time_zone: America/Sao_Paulo
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Histórico e DDL da plataforma ficam no schema admin (versão V1, V2… independente do Client).
    schemas: admin
    default-schema: admin
    create-schemas: true
    table: flyway_schema_history

server:
  port: ${ADMIN_SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

gommo-admin:
  tenant-db:
    # Em dev, permite testar conexao sem vault (senha do tenant = DB_PASSWORD do compose).
    fallback-password: ${TENANT_DB_FALLBACK_PASSWORD:${DB_PASSWORD:${POSTGRES_PASSWORD:}}}
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-minutes: 15
      refresh-token-days: 7
  cors:
    allowed-origins: ${ADMIN_CORS_ORIGINS:http://localhost:3001}
  hr:
    base-url: ${GOMMO_HR_BASE_URL:http://localhost:8081}
    internal-event-secret: ${GOMMO_INTERNAL_EVENT_SECRET:}
  outbox:
    poll-interval-ms: ${GOMMO_ADMIN_OUTBOX_POLL_MS:5000}
  dev:
    admin-username: ${DEV_ADMIN_USERNAME:admin}
    admin-password: ${DEV_ADMIN_PASSWORD}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{correlationId}] %msg%n"
