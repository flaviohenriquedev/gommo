name: Oracle Free Tier - Ampere Capacity Retry

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: infra/terraform/oci/terraform.tfstate
          key: oci-tfstate-${{ github.ref_name }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check if already provisioned
        id: check
        working-directory: infra/terraform/oci
        run: |
          if terraform show -json 2>/dev/null | jq -e '.values.root_module.resources | length > 0' > /dev/null 2>&1; then
            echo "already_provisioned=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_provisioned=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_api_key_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_api_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Skip if already provisioned
        if: steps.check.outputs.already_provisioned == 'true'
        run: echo "Instancia ja existe. Desative o workflow manualmente."

      - name: Terraform init
        if: steps.check.outputs.already_provisioned != 'true'
        working-directory: infra/terraform/oci
        run: terraform init
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_api_key_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_api_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform apply
        id: apply
        if: steps.check.outputs.already_provisioned != 'true'
        working-directory: infra/terraform/oci
        continue-on-error: true
        run: |
          terraform apply -auto-approve 2>&1 | tee /tmp/tf_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_api_key_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_api_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Notify via Telegram on success
        if: steps.apply.outputs.exit_code == '0'
        run: |
          IP=$(cd infra/terraform/oci && terraform output -raw instance_public_ip 2>/dev/null || echo "ver outputs no Actions")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Oracle Free Tier: instancia Ampere provisionada! IP: $IP - acesse http://$IP:8000 para configurar o Coolify."
        env:
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_api_key_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_api_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id: ${{ secrets.OCI_COMPARTMENT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Save Terraform state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: infra/terraform/oci/terraform.tfstate
          key: oci-tfstate-${{ github.ref_name }}-${{ github.run_id }}

      - name: Log result
        if: steps.apply.outputs.exit_code != '0'
        run: |
          echo "Sem capacidade ainda. Proxima tentativa em 10 minutos."
          grep -i "capacity\|InternalError\|500-" /tmp/tf_output.txt || true
