spring:
  application:
    name: gommo-backend
  servlet:
    multipart:
      max-file-size: ${GOMMO_STORAGE_MAX_FILE_SIZE:25MB}
      max-request-size: ${GOMMO_STORAGE_MAX_REQUEST_SIZE:30MB}
  jackson:
    time-zone: America/Sao_Paulo
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: America/Sao_Paulo
  flyway:
    enabled: true
    encoding: UTF-8
    locations: classpath:db/migration
    # Histórico e DDL do HR ficam no schema public (independente do admin).
    schemas: public
    default-schema: public
    create-schemas: false
    table: flyway_schema_history

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

gommo:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-minutes: 8
      refresh-token-rotation-minutes: 15
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://*.localhost:3000}
  multi-tenant:
    enabled: ${GOMMO_MULTI_TENANT_ENABLED:false}
    dev-tenant-slug: ${GOMMO_DEV_TENANT_SLUG:}
    header-enabled: ${GOMMO_TENANT_HEADER_ENABLED:true}
    tenant-header: X-Tenant-Slug
    base-domain: ${GOMMO_TENANT_BASE_DOMAIN:localhost}
    production-base-domain: ${GOMMO_TENANT_PRODUCTION_BASE_DOMAIN:gommo.com.br}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{correlationId}] %msg%n"
