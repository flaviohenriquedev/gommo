spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gommo}
    username: ${DB_USER:gommo}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false

gommo:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
  storage:
    local-base-path: ${STORAGE_LOCAL_PATH:./data/storage}
    bucket: gommo-local
    max-file-size: ${GOMMO_STORAGE_MAX_FILE_SIZE:25MB}
  dev:
    admin-username: ${DEV_ADMIN_USERNAME:admin}
    admin-password: ${DEV_ADMIN_PASSWORD}
