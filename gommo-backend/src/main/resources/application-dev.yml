spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gommo}
    username: ${DB_USER:gommo}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false

gommo:
  multi-tenant:
    dev-tenant-slug: ${GOMMO_DEV_TENANT_SLUG:dev-public}
    dev-public-company-code: ${GOMMO_DEV_PUBLIC_COMPANY_CODE:000000000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://*.localhost:3000,http://localhost:3001,http://localhost:8090}
  storage:
    local-base-path: ${STORAGE_LOCAL_PATH:./data/storage}
    bucket: gommo-local
    max-file-size: ${GOMMO_STORAGE_MAX_FILE_SIZE:25MB}
  dev:
    admin-username: ${DEV_ADMIN_USERNAME:admin}
    admin-password: ${DEV_ADMIN_PASSWORD}
  payment:
    ocr:
      # Vazio = auto-detecta ./data/tessdata e ../data/tessdata (IDE na raiz vs mvn em gommo-backend)
      tessdata-path: ${TESSDATA_PREFIX:}
