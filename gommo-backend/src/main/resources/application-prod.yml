spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

gommo:
  security:
    jwt:
      secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ORIGINS}
  storage:
    local-base-path: ${STORAGE_LOCAL_PATH:/data/storage}
    bucket: ${STORAGE_BUCKET:gommo-prod}
